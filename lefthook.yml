pre-commit:
  commands:
    lint:
      glob: "*.{astro,css,js,json,md,mjs,ts,yaml,yml}"
      run: devcontainer exec --workspace-folder . pnpm exec biome check --write --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
      stage_fixed: true
    type-check:
      glob: "*.{astro,ts}"
      run: devcontainer exec --workspace-folder . pnpm exec astro check
