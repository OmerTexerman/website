backend:
  name: github
  repo: OmerTexerman/website
  branch: main
  base_url: https://sveltia-cms-auth.omer-850.workers.dev

media_folder: public/images/uploads
public_folder: /images/uploads

collections:
  - name: spotlight
    label: Spotlight
    files:
      - name: current
        label: Current Spotlight
        file: src/content/spotlight/current.yaml
        fields:
          - { label: Title, name: title, widget: string, default: "Employee of the Week" }
          - { label: Name, name: name, widget: string, required: false }
          - { label: Image, name: image, widget: image }

  - name: setup
    label: Setup
    files:
      - name: current
        label: Current Setup
        file: src/content/setup/current.yaml
        fields:
          - label: Categories
            name: categories
            widget: list
            fields:
              - { label: Category Name, name: name, widget: string }
              - label: Items
                name: items
                widget: list
                fields:
                  - { label: Name, name: name, widget: string }
                  - { label: Detail, name: detail, widget: string, required: false }

  - name: blog
    label: Blog Posts
    label_singular: Blog Post
    folder: src/content/blog
    create: true
    extension: md
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: text }
      - { label: Publish Date, name: pubDate, widget: datetime, date_format: YYYY-MM-DD, time_format: false, format: YYYY-MM-DD }
      - { label: Updated Date, name: updatedDate, widget: datetime, date_format: YYYY-MM-DD, time_format: false, format: YYYY-MM-DD, required: false }
      - { label: Tags, name: tags, widget: list, required: false }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown }

  - name: projects
    label: Projects
    label_singular: Project
    folder: src/content/projects
    create: true
    extension: md
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: text }
      - { label: Tech Stack, name: tech, widget: list }
      - { label: Image, name: image, widget: image, required: false }
      - { label: Live URL, name: url, widget: string, required: false, pattern: ['^(https:\/\/.+)?$', 'Must be a valid URL (https://...)'] }
      - { label: Repository URL, name: repo, widget: string, required: false, pattern: ['^(https:\/\/.+)?$', 'Must be a valid URL (https://...)'] }
      - { label: Display Order, name: order, widget: number, default: 0, value_type: int }
      - { label: Related Post Slug, name: post, widget: string, required: false }

  - name: books
    label: Reading List
    label_singular: Book
    folder: src/content/books
    create: true
    extension: yaml
    format: yaml
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Author, name: author, widget: string }
      - { label: Spine Color, name: spineColor, widget: color, default: "#2a4a6a" }
      - { label: Cover Image, name: cover, widget: image, required: false }
      - { label: Status, name: status, widget: select, options: [reading, finished, want-to-read] }
      - { label: URL, name: url, widget: string, required: false, pattern: ['^(https:\/\/.+)?$', 'Must be a valid URL (https://...)'] }
      - { label: Related Post, name: post, widget: string, required: false }

  - name: words
    label: Word of the Day
    label_singular: Word
    folder: src/content/words
    create: true
    extension: yaml
    format: yaml
    slug: "{{fields.date}}"
    fields:
      - { label: Word, name: word, widget: string }
      - { label: Part of Speech, name: partOfSpeech, widget: string, required: false }
      - { label: Quip, name: quip, widget: text }
      - { label: Date, name: date, widget: datetime, date_format: YYYY-MM-DD, time_format: false, format: YYYY-MM-DD }
      - { label: Image, name: image, widget: image, required: false }

  - name: photos
    label: Photo Collections
    label_singular: Photo Collection
    folder: src/content/photos
    create: true
    extension: yaml
    format: yaml
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Location, name: location, widget: string, required: false }
      - { label: Date, name: date, widget: string, required: false }
      - { label: Description, name: description, widget: text, required: false }
      - { label: Cover Image, name: cover, widget: image }
      - { label: Related Post, name: post, widget: string, required: false }
      - label: Photos
        name: photos
        widget: list
        fields:
          - { label: Image, name: src, widget: image }
          - { label: Alt Text, name: alt, widget: string }
          - { label: Caption, name: caption, widget: string, required: false }
