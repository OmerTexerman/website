# Photo Collection Template
# Copy this file to src/content/photos/<collection-name>.yaml
# The filename becomes the URL slug: /photos/<collection-name>

title: "Collection Title"
location: "City, Country"
date: "Month Year"
description: "A short description of this collection."
cover: "/photos/<collection-name>/cover.jpg"
# post: "blog-post-slug"  # optional — links to /blog/<slug> with "I wrote about this"
photos:
  - src: "/photos/<collection-name>/01.jpg"
    alt: "Describe what's in the photo"
    caption: "Optional caption shown on hover and in lightbox"
  - src: "/photos/<collection-name>/02.jpg"
    alt: "Another description"
    # caption is optional — omit it if not needed
